<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SqlNotebook</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="fonts/font-sans.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="SqlNotebook.UI.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v=@(MudBlazor.Metadata.Version)" rel="stylesheet" />
    <script src="_content/MudBlazor/MudBlazor.min.js?v=@(MudBlazor.Metadata.Version)"></script>
    <script>
        window.sqlNotebookCopyToClipboard = function(text) { return navigator.clipboard && navigator.clipboard.writeText(text); };
        // MudBlazor.Markdown expects this namespace (script may not be loaded when using project reference)
        window.MudBlazorMarkdown = window.MudBlazorMarkdown || {
            copyTextToClipboard: async function(text) {
                try {
                    if (navigator.clipboard) { await navigator.clipboard.writeText(text); return true; }
                    return false;
                } catch (e) { return false; }
            },
            scrollToElementId: function() {},
            tableOfContents: {
                scrollLock: 0,
                handleRefs: {},
                activeElementIds: {},
                startScrollSpy: function() {},
                stopScrollSpy: function() {}
            }
        };
        window.highlightCodeElement = window.highlightCodeElement || function(element, text, language) {
            if (element && text != null) element.textContent = text;
        };
        window.setHighlightStylesheet = window.setHighlightStylesheet || function() {};
        window.sqlNotebookExcalidraw = {
            sendContent: function(iframeId, content) {
                var frame = document.getElementById(iframeId);
                if (frame && frame.contentWindow && content != null)
                    frame.contentWindow.postMessage({ type: "excalidraw-set", content: content }, "*");
            },
            requestContent: function(iframeId) {
                var frame = document.getElementById(iframeId);
                if (frame && frame.contentWindow)
                    frame.contentWindow.postMessage({ type: "excalidraw-get" }, "*");
            },
            importFromFile: function(iframeId) {
                var frame = document.getElementById(iframeId);
                if (!frame || !frame.contentWindow) return;
                var input = document.createElement("input");
                input.type = "file";
                input.accept = "application/json";
                input.style.display = "none";
                input.onchange = function () {
                    if (!input.files || !input.files.length) return;
                    var file = input.files[0];
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        try {
                            var text = e.target && e.target.result ? String(e.target.result) : "";
                            if (!text) return;
                            frame.contentWindow.postMessage({ type: "excalidraw-set", content: text }, "*");
                        } catch { }
                    };
                    try { reader.readAsText(file); } catch { }
                };
                document.body.appendChild(input);
                input.click();
                setTimeout(function () { if (input.parentNode) input.parentNode.removeChild(input); }, 0);
            },
            listenForChanges: function(iframeId, dotNetRef, methodName, onReadyMethodName, onEscMethodName) {
                methodName = methodName || "OnExcalidrawChange";
                var handler = function(event) {
                    var frame = document.getElementById(iframeId);
                    if (!frame || !frame.contentWindow || event.source !== frame.contentWindow) return;
                    if (event.data && event.data.type === "excalidraw-change" && event.data.content != null)
                        dotNetRef.invokeMethodAsync(methodName, event.data.content);
                    if (event.data && event.data.type === "excalidraw-ready" && onReadyMethodName)
                        dotNetRef.invokeMethodAsync(onReadyMethodName);
                    if (event.data && event.data.type === "excalidraw-esc" && onEscMethodName)
                        dotNetRef.invokeMethodAsync(onEscMethodName);
                };
                window.addEventListener("message", handler);
                if (!window.__excalidrawListeners) window.__excalidrawListeners = {};
                window.__excalidrawListeners[iframeId] = handler;
            },
            stopListen: function(iframeId) {
                var h = window.__excalidrawListeners && window.__excalidrawListeners[iframeId];
                if (h) { window.removeEventListener("message", h); delete window.__excalidrawListeners[iframeId]; }
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <svg class="loading-progress" aria-hidden="true">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                <div class="loading-progress-bar-fill"></div>
            </div>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
